<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Token Usage Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #fff;
        }
        .status-alert {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }
        .alert-danger {
            background: #c41e3a;
            color: #fff;
        }
        .alert-warning {
            background: #ff8c00;
            color: #fff;
        }
        .alert-info {
            background: #0066cc;
            color: #fff;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
        }
        .metric-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        .metric-sub {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }
        canvas {
            max-height: 300px;
        }
        .recent-sessions {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
        }
        .session-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .session-item:last-child {
            border-bottom: none;
        }
        .session-info {
            flex: 1;
        }
        .session-title {
            font-size: 12px;
            color: #888;
        }
        .session-timestamp {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }
        .session-tokens {
            font-weight: bold;
            color: #4eaf0f;
        }
        .last-updated {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Claude Token Usage</h1>
            <div id="alert" class="status-alert alert-danger" style="display: none;"></div>
        </header>

        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Today's Usage</div>
                <div class="metric-value" id="todayTokens">—</div>
                <div class="metric-sub" id="todaySessions">0 sessions</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">5-Hour Window</div>
                <div class="metric-value" id="windowTokens">—</div>
                <div class="metric-sub" id="windowPct">0% of budget</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">14-Day Total</div>
                <div class="metric-value" id="totalTokens">—</div>
                <div class="metric-sub">All sessions</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Lifetime Usage</div>
                <div class="metric-value" id="lifetimeTokens">—</div>
                <div class="metric-sub" id="totalSessions">0 sessions</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-container">
                <div class="chart-title">Daily Usage (14 days)</div>
                <canvas id="dailyChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Hourly Breakdown (Today)</div>
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="recent-sessions">
            <div class="chart-title" style="margin-bottom: 10px;">Recent Sessions</div>
            <div id="recentSessionsList"></div>
        </div>

        <div class="last-updated">
            <span id="lastUpdated">Last updated: 2026-04-11 14:31:58</span>
        </div>
    </div>

    <script>
        const DATA = {
    "generatedAt": "2026-04-11T14:31:58.561000",
    "today": "2026-04-11",
    "todaySessionCount": 7,
    "todayTokens": 889200,
    "totalSessions": 251,
    "totalTokens": 65674637,
    "windowTokens": 251900,
    "windowBudget": 200000,
    "windowPct": 126.0,
    "windowStartISO": "2026-04-11T09:31:58",
    "dailyLabels": [
        "03-29",
        "03-30",
        "03-31",
        "04-01",
        "04-02",
        "04-03",
        "04-04",
        "04-05",
        "04-06",
        "04-07",
        "04-08",
        "04-09",
        "04-10",
        "04-11"
    ],
    "dailySessions": [
        6,
        13,
        13,
        16,
        6,
        8,
        10,
        13,
        13,
        15,
        17,
        15,
        12,
        7
    ],
    "dailyTokensK": [
        3192.8,
        8602.6,
        7798.3,
        3664.3,
        750.2,
        1118.1,
        1410.5,
        1590.6,
        1551.6,
        1480.5,
        1778.2,
        1484.2,
        1087.5,
        889.2
    ],
    "hourlyTokensK": [
        0,
        0,
        0,
        0,
        0,
        0,
        0,
        0,
        129.2,
        0,
        0,
        129.2,
        0,
        0,
        122.7,
        0,
        0,
        0,
        0,
        0,
        0,
        0,
        0,
        0
    ],
    "recentSessions": [
        {
            "timestamp": "2026-04-11T14:31:58.561000",
            "title": "Claude usage intraday",
            "model": "claude-haiku-4-5-20251001",
            "tokensK": 122.754
        },
        {
            "timestamp": "2026-04-11T13:01:56.809000",
            "title": "Claude usage intraday",
            "model": "claude-haiku-4-5-20251001",
            "tokensK": 129.243
        },
        {
            "timestamp": "2026-04-11T08:47:48.958000",
            "title": "Portfolio update reminder",
            "model": "claude-sonnet-4-6",
            "tokensK": 129.195
        },
        {
            "timestamp": "2026-04-11T07:31:40.529000",
            "title": "Claude usage intraday",
            "model": "claude-haiku-4-5-20251001",
            "tokensK": 129.245
        },
        {
            "timestamp": "2026-04-11T04:19:49.396000",
            "title": "Claude dashboard refresh",
            "model": "claude-haiku-4-5-20251001",
            "tokensK": 128.195
        }
    ]
};

        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(Math.round(num));
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function updateMetrics() {
            // Today's usage
            document.getElementById('todayTokens').textContent = formatNumber(DATA.todayTokens);
            document.getElementById('todaySessions').textContent = `${DATA.todaySessionCount} session${DATA.todaySessionCount !== 1 ? 's' : ''}`;

            // Window usage
            document.getElementById('windowTokens').textContent = formatNumber(DATA.windowTokens);
            const windowPctElement = document.getElementById('windowPct');
            windowPctElement.textContent = `${DATA.windowPct.toFixed(1)}% of ${formatNumber(DATA.windowBudget)} budget`;
            windowPctElement.style.color = DATA.windowPct > 100 ? '#ff4444' : DATA.windowPct > 80 ? '#ff8c00' : '#4eaf0f';

            // 14-day total
            const total14day = DATA.dailyTokensK.reduce((a, b) => a + b, 0) * 1000;
            document.getElementById('totalTokens').textContent = formatNumber(total14day);

            // Lifetime
            document.getElementById('lifetimeTokens').textContent = formatNumber(DATA.totalTokens);
            document.getElementById('totalSessions').textContent = `${DATA.totalSessions} sessions`;

            // Last updated
            document.getElementById('lastUpdated').textContent = `Last updated: ${DATA.generatedAt}`;

            // Alert
            const alertElement = document.getElementById('alert');
            if (DATA.windowPct > 100) {
                alertElement.textContent = `⚠️ Window exceeded! ${DATA.windowPct.toFixed(1)}% of daily budget used.`;
                alertElement.style.display = 'inline-block';
            } else {
                alertElement.style.display = 'none';
            }
        }

        function createDailyChart() {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: DATA.dailyLabels,
                    datasets: [
                        {
                            label: 'Tokens (K)',
                            data: DATA.dailyTokensK,
                            backgroundColor: '#4eaf0f',
                            borderColor: '#3a8108',
                            borderWidth: 1
                        },
                        {
                            label: 'Sessions',
                            data: DATA.dailySessions,
                            backgroundColor: '#0066cc',
                            borderColor: '#0052a3',
                            borderWidth: 1,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Tokens (K)',
                                color: '#4eaf0f'
                            },
                            ticks: {
                                color: '#888'
                            },
                            grid: {
                                color: '#333'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Sessions',
                                color: '#0066cc'
                            },
                            ticks: {
                                color: '#888'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        },
                        x: {
                            ticks: {
                                color: '#888'
                            },
                            grid: {
                                color: '#333'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0'
                            }
                        }
                    }
                }
            });
        }

        function createHourlyChart() {
            const ctx = document.getElementById('hourlyChart').getContext('2d');
            const hourLabels = Array.from({length: 24}, (_, i) => `${i}:00`);
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: hourLabels,
                    datasets: [
                        {
                            label: 'Tokens (K)',
                            data: DATA.hourlyTokensK,
                            borderColor: '#4eaf0f',
                            backgroundColor: 'rgba(78, 175, 15, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#4eaf0f',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 1,
                            pointRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#888'
                            },
                            grid: {
                                color: '#333'
                            },
                            title: {
                                display: true,
                                text: 'Tokens (K)',
                                color: '#4eaf0f'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#888'
                            },
                            grid: {
                                color: '#333'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e0e0e0'
                            }
                        }
                    }
                }
            });
        }

        function updateRecentSessions() {
            const listElement = document.getElementById('recentSessionsList');
            listElement.innerHTML = DATA.recentSessions.map(session => `
                <div class="session-item">
                    <div class="session-info">
                        <div class="session-title">${session.title}</div>
                        <div class="session-timestamp">${formatDate(session.timestamp)} • ${session.model}</div>
                    </div>
                    <div class="session-tokens">${session.tokensK.toFixed(1)}K</div>
                </div>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateMetrics();
            createDailyChart();
            createHourlyChart();
            updateRecentSessions();
        });
    </script>
</body>
</html>
