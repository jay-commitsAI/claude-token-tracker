<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Token Tracker Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #1e2749;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-meta {
            text-align: right;
            font-size: 13px;
            color: #888;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #0f1435;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .metric-card:hover {
            border-color: #2d3f5f;
        }

        .metric-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: #0f1435;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            height: 300px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ccc;
        }

        .recent-sessions {
            background: #0f1435;
            border: 1px solid #1e2749;
            border-radius: 8px;
            padding: 20px;
        }

        .recent-sessions h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ccc;
        }

        .session-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px solid #1a2140;
            font-size: 13px;
        }

        .session-item:last-child {
            border-bottom: none;
        }

        .session-info {
            display: grid;
            gap: 3px;
        }

        .session-title {
            color: #fff;
            font-weight: 500;
        }

        .session-meta {
            color: #666;
            font-size: 12px;
        }

        .session-tokens {
            text-align: right;
            color: #4CAF50;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Claude Token Tracker</h1>
            <div class="header-meta">
                <div>Last updated: <span id="updated">2026-04-12 00:00:00</span></div>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Today's Tokens</div>
                <div class="metric-value" id="todayValue">889,200</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">7-Day Window</div>
                <div class="metric-value" id="windowValue">251,900</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total (All Time)</div>
                <div class="metric-value" id="totalValue">65,674,637</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">Daily Token Usage (7 days)</div>
                <canvas id="dailyChart"></canvas>
            </div>
            <div class="chart-container">
                <div class="chart-title">Hourly Breakdown (Last 24h)</div>
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <div class="recent-sessions">
            <h2>Recent Sessions</h2>
            <div id="sessionsList"></div>
        </div>
    </div>

    <script>
        const DATA = {
            generatedAt: "2026-04-12T00:00:00.000000",
            today: "2026-04-12",
            todayTokens: 889200,
            windowTokens: 251900,
            totalTokens: 65674637,
            dailyLabels: ["2026-04-05", "2026-04-06", "2026-04-07", "2026-04-08", "2026-04-09", "2026-04-10", "2026-04-11"],
            dailySessions: [3, 5, 2, 6, 4, 3, 7],
            dailyTokensK: [245.3, 389.2, 156.8, 412.5, 298.1, 267.4, 889.2],
            hourlyTokensK: [12.5, 8.3, 5.2, 3.1, 2.8, 15.4, 22.1, 18.9, 34.5, 41.2, 48.3, 52.1, 45.3, 38.9, 35.6, 41.2, 48.5, 44.1, 39.8, 36.2, 29.4, 24.1, 18.5, 14.3],
            recentSessions: [
                {
                    timestamp: "2026-04-11 22:45",
                    title: "Building Claude and Tools/Guides — scheduling tasks",
                    model: "claude-haiku-4-5",
                    tokensK: 124.5
                },
                {
                    timestamp: "2026-04-11 20:15",
                    title: "Project architecture review",
                    model: "claude-opus-4-6",
                    tokensK: 89.3
                },
                {
                    timestamp: "2026-04-11 18:30",
                    title: "Code refactoring session",
                    model: "claude-sonnet-4-6",
                    tokensK: 156.2
                },
                {
                    timestamp: "2026-04-11 15:20",
                    title: "Documentation generation",
                    model: "claude-haiku-4-5",
                    tokensK: 67.8
                },
                {
                    timestamp: "2026-04-11 12:05",
                    title: "API integration planning",
                    model: "claude-opus-4-6",
                    tokensK: 98.5
                }
            ]
        };

        // Initialize metrics
        document.getElementById('todayValue').textContent = DATA.todayTokens.toLocaleString();
        document.getElementById('windowValue').textContent = DATA.windowTokens.toLocaleString();
        document.getElementById('totalValue').textContent = DATA.totalTokens.toLocaleString();
        document.getElementById('updated').textContent = new Date(DATA.generatedAt).toLocaleString();

        // Populate recent sessions
        const sessionsList = document.getElementById('sessionsList');
        DATA.recentSessions.forEach(session => {
            const item = document.createElement('div');
            item.className = 'session-item';
            item.innerHTML = `
                <div class="session-info">
                    <div class="session-title">${session.title}</div>
                    <div class="session-meta">${session.timestamp} • ${session.model}</div>
                </div>
                <div class="session-tokens">${session.tokensK.toLocaleString()}K</div>
            `;
            sessionsList.appendChild(item);
        });

        // Initialize charts
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        color: '#666'
                    },
                    grid: {
                        color: '#1a2140'
                    }
                },
                x: {
                    ticks: {
                        color: '#666'
                    },
                    grid: {
                        display: false
                    }
                }
            }
        };

        new Chart(document.getElementById('dailyChart'), {
            type: 'bar',
            data: {
                labels: DATA.dailyLabels,
                datasets: [{
                    label: 'Tokens (K)',
                    data: DATA.dailyTokensK,
                    backgroundColor: '#4CAF50',
                    borderRadius: 4
                }]
            },
            options: chartOptions
        });

        new Chart(document.getElementById('hourlyChart'), {
            type: 'line',
            data: {
                labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                datasets: [{
                    label: 'Tokens (K)',
                    data: DATA.hourlyTokensK,
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3,
                    pointBackgroundColor: '#4CAF50'
                }]
            },
            options: chartOptions
        });
    </script>
</body>
</html>
